server {
    listen 80;
    server_name продеталь70.рф www.продеталь70.рф;

    location /.well-known/acme-challenge/ {
        alias /var/www/certbot/;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name продеталь70.рф www.продеталь70.рф;

    ssl_certificate /etc/letsencrypt/live/xn--70-6kcpf1brhjx6i.xn--p1ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xn--70-6kcpf1brhjx6i.xn--p1ai/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 50M;

    location /.well-known/acme-challenge/ {
        alias /var/www/certbot/;
    }

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        client_max_body_size 50M;
    }

    location / {
        try_files $uri /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}