server {
    listen 80;
    server_name продеталь70.рф www.продеталь70.рф;

    location /.well-known/acme-challenge/ {
        alias /var/www/certbot/;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name продеталь70.рф www.продеталь70.рф;

    ssl_certificate /etc/letsencrypt/live/xn--70-6kcpf1brhjx6i.xn--p1ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xn--70-6kcpf1brhjx6i.xn--p1ai/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    # ← ДОБАВИТЬ ЭТОТ БЛОК
    location /.well-known/acme-challenge/ {
        alias /var/www/certbot/;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        client_max_body_size 10M;
    }

    location / {
        try_files $uri /index.html;
    }
}